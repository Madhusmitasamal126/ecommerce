{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyShop{% endblock %}</title>
  <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
  <script src="{% static 'js/main.js' %}" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>


<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'index' %}">
      <img src="{% static 'img/logo1.png' %}" alt="Logo" style="width: 40px; height:30px;">
      MyShop
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'index' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>

      <!-- Categories Dropdown -->
<li class="nav-item dropdown">
  <a class="nav-link dropdown-toggle" href="javascript:void(0);" id="categoriesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
  Categories
</a>

  <ul class="dropdown-menu" aria-labelledby="categoriesDropdown">
    {% for cat in all_categories %}
      <li>
        <a class="dropdown-item" href="{% url 'category_detail' cat.slug %}">
          {{ cat.cat_name }}
        </a>
      </li>
    {% endfor %}
  </ul>
</li>


        <li class="nav-item">
  <a class="nav-link {% if request.path == '/contact/' %}active{% endif %}" href="{% url 'contact' %}">
    Contact
  </a>
</li>
      </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-light me-2" type="submit">Search</button>
        <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-outline-light">Register</a>
        <a href="{% url 'cart' %}" class="btn btn-warning ms-2">
          <i class="bi bi-cart"></i> Cart
        </a>
      </form>
    </div>
  </div>
</nav>


<!-- Main Content -->
<main class="container my-5">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">&copy; 2025 MyShop. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
