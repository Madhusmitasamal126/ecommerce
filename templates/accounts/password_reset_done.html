{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset Sent - MyShop</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0f7fa, #e3f2fd);
        }

        .info-card {
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 25px;
            background: #ffffffcc;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top left, #0d6efd33, transparent 70%);
            top: -50%;
            left: -50%;
            transform: rotate(25deg);
        }

        .info-card h2 {
            font-weight: 700;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .info-card p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #0d6efd, #6610f2);
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            transition: 0.3s;
            border: none;
            position: relative;
            z-index: 1;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .email-icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="info-card">
        <i class="bi bi-envelope-fill email-icon"></i>
        <h2>Check Your Email</h2>
        <p>We have sent you instructions for resetting your password. Please check your inbox and follow the steps.</p>
        <a href="{% url 'login' %}" class="btn btn-gradient">Back to Login</a>
    </div>
</body>
</html>
