{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Set New Password - MyShop</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0f7fa, #e3f2fd);
        }

        .reset-card {
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 25px;
            background: #ffffffcc;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .reset-card::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top right, #0d6efd33, transparent 70%);
            top: -50%;
            left: -50%;
            transform: rotate(25deg);
        }

        .reset-card h2 {
            font-weight: 700;
            position: relative;
            z-index: 1;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #0d6efd, #6610f2);
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            transition: 0.3s;
            display: inline-block;
            margin-top: 15px;
            border: none;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .lock-icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <i class="bi bi-lock-fill lock-icon"></i>
        <h2>Set New Password</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-gradient">Reset Password</button>
        </form>
    </div>
</body>
</html>
