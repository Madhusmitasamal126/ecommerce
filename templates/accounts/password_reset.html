{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset - MyShop</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e3f2fd, #e0f7fa);
        }

        .reset-card {
            max-width: 450px;
            width: 100%;
            background: #ffffffcc;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .reset-card::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top right, #0d6efd33, transparent 70%);
            top: -50%;
            left: -50%;
            transform: rotate(25deg);
        }

        .reset-card h2 {
            font-weight: 700;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .reset-card p {
            position: relative;
            z-index: 1;
            font-size: 0.95rem;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #0d6efd, #6610f2);
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            transition: 0.3s;
            border: none;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .email-icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        input.form-control {
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <i class="bi bi-envelope-fill email-icon"></i>
        <h2>Reset Password</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="form-control my-3" placeholder="Enter your email" required>
            <button type="submit" class="btn btn-gradient my-2">Send Reset Link</button>
        </form>
        <p class="mt-3"><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
</body>
</html>
