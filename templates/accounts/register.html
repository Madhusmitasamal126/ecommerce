{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - MyShop</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("{% static 'img/wl.jpg' %}") no-repeat center center fixed;
            background-size: cover;
        }

        .register-card {
            width: 100%;
            max-width: 450px;
            background: rgba(0,0,0,0.7);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .register-card h2 {
            font-weight: 700;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 50px;
            margin-bottom: 15px;
            padding: 10px 20px;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            border: none;
            width: 100%;
            transition: 0.3s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        a {
            color: #ffc107;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .bi-person-circle {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ffc107;
        }

        @media(max-width:576px){
            .register-card{
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <i class="bi bi-person-circle"></i>
        <h2>Create an Account</h2>

        <form method="POST">
            {% csrf_token %}
            {% include "alert.html" %}

            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="email" name="email" class="form-control" placeholder="Email" required>
            <input type="password" name="password1" class="form-control" placeholder="Password" required>
            <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
            
            <button type="submit" class="btn btn-gradient mt-2">Register</button>
        </form>

        <p class="mt-3">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</body>
</html>
