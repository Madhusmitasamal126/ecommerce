{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - MyShop</title>
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<style>
/* Body and Background */
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #6fb1fc, #4364f7, #6fb1fc, #43e97b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

/* Gradient animation */
@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Login Card */
.login-card {
    width: 380px;
    padding: 40px 30px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    position: relative;
    text-align: center;
    color: #fff;
    overflow: hidden;
}

/* Card Title */
.login-card h2 {
    font-weight: 700;
    margin-bottom: 25px;
}

/* Input Fields */
.login-card .form-control {
    border-radius: 50px;
    border: none;
    padding: 12px 20px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 500;
    transition: 0.3s;
}
.login-card .form-control::placeholder {
    color: #f0f0f0;
}
.login-card .form-control:focus {
    background: rgba(255,255,255,0.3);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    color: #fff;
}

/* Button Gradient */
.btn-gradient {
    width: 100%;
    border-radius: 50px;
    padding: 10px;
    font-weight: 600;
    background: linear-gradient(90deg, #ff512f, #dd2476);
    border: none;
    color: #fff;
    transition: 0.4s;
}
.btn-gradient:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Links */
.links a {
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
}
.links a:hover {
    color: #ffdd59;
}

/* Social Buttons */
.social-login button {
    border-radius: 50px;
    padding: 8px 20px;
    font-weight: 600;
    transition: 0.3s;
}
.social-login button:hover {
    transform: scale(1.05);
}

/* Responsive */
@media(max-width: 400px){
    .login-card { width: 90%; padding: 30px 20px; }
}
</style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="text" name="username" class="form-control" placeholder="Username" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
        <button type="submit" class="btn btn-gradient mb-3">Login</button>
    </form>

    <div class="links mb-3">
        <a href="{% url 'password_reset' %}">Forgot Password?</a> |
        <a href="{% url 'register' %}">Register</a>
    </div>

    <p>Or login with</p>
    <div class="d-flex justify-content-center gap-2 social-login">
        <button class="btn btn-outline-primary"><i class="bi bi-facebook"></i> Facebook</button>
        <button class="btn btn-outline-danger"><i class="bi bi-google"></i> Google</button>
    </div>
</div>

</body>
</html>
